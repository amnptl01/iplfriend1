<!DOCTYPE html>
<html>
<head>

<title>IPL Fantasy Pro</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:15px;
}

.card{
background:#1e293b;
padding:10px;
margin:5px;
border-radius:8px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:8px;
}

button{
background:#f97316;
border:none;
padding:10px;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:5px;
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>IPL Fantasy Pro</header>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>Login</h2>
<input id="username" placeholder="Enter Name">
<button onclick="login()">Enter</button>
</div>

<!-- MAIN -->
<div id="mainPage" class="container hidden">

<h3>Welcome <span id="user"></span></h3>

<input id="search" placeholder="Search Player">
<select id="teamFilter">
<option value="ALL">All</option>
<option value="CSK">CSK</option>
<option value="MI">MI</option>
<option value="RCB">RCB</option>
<option value="KKR">KKR</option>
<option value="SRH">SRH</option>
<option value="GT">GT</option>
<option value="RR">RR</option>
<option value="DC">DC</option>
<option value="PBKS">PBKS</option>
<option value="LSG">LSG</option>
</select>

<div class="players" id="players"></div>

<button onclick="saveTeam()">Save Team</button>

<h3>Captain</h3>
<select id="captain"></select>

<h3>Vice Captain</h3>
<select id="vice"></select>

</div>

<!-- PREVIEW -->
<div id="previewPage" class="container hidden">
<h2>Your Team</h2>
<ul id="previewTeam"></ul>
<button onclick="confirmTeam()">Confirm</button>
<button onclick="back()">Edit</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderPage" class="container hidden">
<h2>Leaderboard</h2>
<ul id="leaderboard"></ul>

<h2>Live Matches</h2>
<div id="liveMatches"></div>

<button onclick="backHome()">Back</button>
</div>

<script>

// LOGIN
function login(){
let name=document.getElementById("username").value;
if(!name){alert("Enter name");return;}
localStorage.setItem("user",name);
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");
document.getElementById("user").innerText=name;
renderPlayers();
}


// PLAYERS (SHORT SAMPLE - tum apni full list replace kar sakte ho)
const players=[
["MS Dhoni","CSK"],["Virat Kohli","RCB"],["Rohit Sharma","MI"],
["Hardik Pandya","MI"],["Rinku Singh","KKR"],["Pat Cummins","SRH"],
["Shubman Gill","GT"],["Sanju Samson","RR"],["KL Rahul","DC"],
["Shreyas Iyer","PBKS"],["Rishabh Pant","LSG"]
];


// RENDER
function renderPlayers(){
let div=document.getElementById("players");
div.innerHTML="";
let search=document.getElementById("search").value.toLowerCase();
let team=document.getElementById("teamFilter").value;

players.forEach(p=>{
if(p[0].toLowerCase().includes(search) && (team==="ALL"||p[1]===team)){
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<input type="checkbox" value="${p[0]}"> ${p[0]} (${p[1]})`;
div.appendChild(c);
}
});
}

document.getElementById("search").oninput=renderPlayers;
document.getElementById("teamFilter").onchange=renderPlayers;


// SAVE TEAM
function saveTeam(){
let sel=document.querySelectorAll("input:checked");
if(sel.length>11){alert("Max 11");return;}

let team=[];
sel.forEach(x=>team.push(x.value));

localStorage.setItem("team",JSON.stringify(team));

populateCaptain(team);
showPreview(team);
}


// CAPTAIN
function populateCaptain(team){
let cap=document.getElementById("captain");
let vice=document.getElementById("vice");

cap.innerHTML="";
vice.innerHTML="";

team.forEach(p=>{
let o=document.createElement("option");
o.text=p;
cap.appendChild(o);

let o2=document.createElement("option");
o2.text=p;
vice.appendChild(o2);
});
}


// PREVIEW
function showPreview(team){
document.getElementById("mainPage").classList.add("hidden");
document.getElementById("previewPage").classList.remove("hidden");

let ul=document.getElementById("previewTeam");
ul.innerHTML="";
team.forEach(p=>{
let li=document.createElement("li");
li.innerText=p;
ul.appendChild(li);
});
}


// BACK
function back(){
document.getElementById("previewPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");
}


// CONFIRM
function confirmTeam(){

localStorage.setItem("captain",document.getElementById("captain").value);
localStorage.setItem("vice",document.getElementById("vice").value);

document.getElementById("previewPage").classList.add("hidden");
document.getElementById("leaderPage").classList.remove("hidden");

updateLeaderboard();
getLiveScore();
}


// POINT SYSTEM
function calcPoints(){
let team=JSON.parse(localStorage.getItem("team")||"[]");

let total=0;

team.forEach(p=>{
let pts=Math.floor(Math.random()*50);

if(p===localStorage.getItem("captain")) pts*=2;
if(p===localStorage.getItem("vice")) pts*=1.5;

total+=pts;
});

return Math.floor(total);
}


// LEADERBOARD
function updateLeaderboard(){
let name=localStorage.getItem("user");
let pts=calcPoints();

let li=document.createElement("li");
li.innerText=name+" - "+pts+" pts";

let board=document.getElementById("leaderboard");
board.innerHTML="";
board.appendChild(li);
}


// LIVE API
function getLiveScore(){

fetch("https://api.cricapi.com/v1/currentMatches?apikey=PwD74O8801.453")
.then(res=>res.json())
.then(data=>{

let div=document.getElementById("liveMatches");
div.innerHTML="";

if(!data.data) return;

data.data.slice(0,3).forEach(m=>{

let d=document.createElement("div");
d.className="card";

d.innerHTML=`<b>${m.name}</b><br>${m.status}`;

div.appendChild(d);

});

});

}


// BACK HOME
function backHome(){
document.getElementById("leaderPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");
}

</script>

</body>
</html>
