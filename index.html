<!DOCTYPE html>
<html>
<head>

<title>IPL Fantasy Friends</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:8px;
margin:8px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
}

button{
background:#f97316;
border:none;
padding:10px 18px;
border-radius:6px;
color:white;
cursor:pointer;
font-weight:bold;
}

input,select{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

.hidden{
display:none;
}

ul{
list-style:none;
padding:0;
}

li{
background:#1e293b;
padding:8px;
margin:5px 0;
border-radius:6px;
}

</style>

</head>

<body>

<header>
IPL Fantasy League
</header>


<div id="loginPage" class="container">

<h2>Login</h2>

<input id="loginName" placeholder="Enter username">

<br>

<button onclick="login()">Login</button>

</div>



<div id="mainPage" class="container hidden">

<h2>Welcome <span id="user"></span></h2>

<input id="search" placeholder="Search Player">

<select id="teamFilter">

<option value="ALL">All Teams</option>
<option value="CSK">CSK</option>
<option value="MI">MI</option>
<option value="RCB">RCB</option>
<option value="KKR">KKR</option>
<option value="SRH">SRH</option>
<option value="GT">GT</option>
<option value="RR">RR</option>
<option value="DC">DC</option>
<option value="PBKS">PBKS</option>
<option value="LSG">LSG</option>

</select>

<br><br>

<div class="players" id="players"></div>

<br>

<button onclick="saveTeam()">Save Team</button>

<h3>Your Team</h3>

<ul id="teamList"></ul>

<h3>Captain</h3>

<select id="captain"></select>

<h3>Vice Captain</h3>

<select id="vice"></select>

</div>


<div id="previewPage" class="container hidden">

<h2>Your Fantasy Team</h2>

<ul id="previewTeam"></ul>

<br>

<button onclick="confirmTeam()">Confirm Team</button>

<button onclick="editTeam()">Edit</button>

</div>



<div id="leaderPage" class="container hidden">

<h2>Leaderboard</h2>

<ul id="leaderboard"></ul>

<button onclick="backHome()">Back</button>

</div>



<script>


const players=[

["MS Dhoni","CSK"],
["Ruturaj Gaikwad","CSK"],
["Shivam Dube","CSK"],
["Virat Kohli","RCB"],
["Rohit Sharma","MI"],
["Hardik Pandya","MI"],
["Jasprit Bumrah","MI"],
["Andre Russell","KKR"],
["Rinku Singh","KKR"],
["Pat Cummins","SRH"],
["Heinrich Klaasen","SRH"],
["Shubman Gill","GT"],
["Rashid Khan","GT"],
["Sanju Samson","RR"],
["Yashasvi Jaiswal","RR"],
["KL Rahul","DC"],
["Axar Patel","DC"],
["Shreyas Iyer","PBKS"],
["Arshdeep Singh","PBKS"],
["Rishabh Pant","LSG"],
["Nicholas Pooran","LSG"]

]



function login(){

let name=document.getElementById("loginName").value

if(name===""){
alert("Enter username")
return
}

localStorage.setItem("user",name)

document.getElementById("loginPage").classList.add("hidden")

document.getElementById("mainPage").classList.remove("hidden")

document.getElementById("user").textContent=name

renderPlayers()

}



function renderPlayers(){

let div=document.getElementById("players")

div.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

let team=document.getElementById("teamFilter").value


players.forEach(p=>{

if(
p[0].toLowerCase().includes(search)
&&
(team==="ALL"||p[1]===team)
){

let card=document.createElement("div")

card.className="card"

card.innerHTML=

`<label>
<input type="checkbox" value="${p[0]}">
${p[0]} (${p[1]})
</label>`

div.appendChild(card)

}

})

}



document.getElementById("search").oninput=renderPlayers
document.getElementById("teamFilter").onchange=renderPlayers



function saveTeam(){

let selected=document.querySelectorAll("input:checked")

if(selected.length>11){

alert("Max 11 players")

return

}

let team=[]

selected.forEach(p=>team.push(p.value))

localStorage.setItem("team",JSON.stringify(team))

displayTeam(team)

}



function displayTeam(team){

let ul=document.getElementById("teamList")

ul.innerHTML=""

team.forEach(p=>{

let li=document.createElement("li")

li.textContent=p

ul.appendChild(li)

})

populateCaptain(team)

showPreview(team)

}



function populateCaptain(team){

let cap=document.getElementById("captain")
let vice=document.getElementById("vice")

cap.innerHTML=""
vice.innerHTML=""

team.forEach(p=>{

let o=document.createElement("option")
o.textContent=p
cap.appendChild(o)

let o2=document.createElement("option")
o2.textContent=p
vice.appendChild(o2)

})

}



function showPreview(team){

document.getElementById("mainPage").classList.add("hidden")

document.getElementById("previewPage").classList.remove("hidden")

let ul=document.getElementById("previewTeam")

ul.innerHTML=""

team.forEach(p=>{

let li=document.createElement("li")

li.textContent=p

ul.appendChild(li)

})

}



function editTeam(){

document.getElementById("previewPage").classList.add("hidden")

document.getElementById("mainPage").classList.remove("hidden")

}



function confirmTeam(){

document.getElementById("previewPage").classList.add("hidden")

document.getElementById("leaderPage").classList.remove("hidden")

updateLeaderboard()

}



function updateLeaderboard(){

let board=document.getElementById("leaderboard")

board.innerHTML=""

let name=localStorage.getItem("user")

let points=Math.floor(Math.random()*150)

let li=document.createElement("li")

li.textContent=name+" - "+points+" pts"

board.appendChild(li)

}



function backHome(){

document.getElementById("leaderPage").classList.add("hidden")

document.getElementById("mainPage").classList.remove("hidden")

}



function fetchLiveScore(){

fetch("https://api.cricapi.com/v1/currentMatches?apikey=YOURKEY")

.then(res=>res.json())

.then(data=>{

console.log("Live Matches",data)

})

}



</script>

</body>
</html>
