<!DOCTYPE html>
<html>
<head>
<title>IPL Fantasy League</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ Firebase scripts FIRST -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#1e293b;padding:20px;text-align:center;font-size:28px;font-weight:bold;}
.container{max-width:1200px;margin:auto;padding:20px;}
.card{background:#1e293b;padding:10px;border-radius:8px;margin:5px;}
.players{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
button{background:#f97316;border:none;padding:10px;border-radius:6px;color:white;cursor:pointer;}
.hidden{display:none;}
ul{list-style:none;padding:0;}
li{background:#1e293b;margin:5px;padding:8px;border-radius:6px;}
</style>
</head>

<body>

<header>IPL Fantasy League</header>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>Login</h2>
<input id="loginName" placeholder="Enter username">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainPage" class="container hidden">
<h2>Welcome <span id="user"></span></h2>

<div class="players" id="players"></div>

<button onclick="saveTeam()">Save Team</button>

<h3>Your Team</h3>
<ul id="teamList"></ul>

<button onclick="goLeaderboard()">Leaderboard</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderPage" class="container hidden">
<h2>Leaderboard</h2>
<ul id="leaderboard"></ul>
<button onclick="back()">Back</button>
</div>

<script>

// ✅ Firebase init
const firebaseConfig = {
apiKey: "AlzaSyB6JR0xr92i4Xr0eZpZobG0-4Zt8CdPVKw",
authDomain: "iplfantasy1-83e70.firebaseapp.com",
projectId: "iplfantasy1-83e70"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// PLAYERS
const players = [
["Virat Kohli","RCB"],
["Rohit Sharma","MI"],
["MS Dhoni","CSK"],
["Hardik Pandya","MI"],
["Rashid Khan","GT"],
["KL Rahul","DC"],
["Shubman Gill","GT"],
["Andre Russell","KKR"]
];

// LOGIN
function login(){
let name=document.getElementById("loginName").value;
if(name===""){alert("Enter name");return;}

localStorage.setItem("user",name);

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");

document.getElementById("user").innerText=name;

renderPlayers();
}

// RENDER PLAYERS
function renderPlayers(){
let div=document.getElementById("players");
div.innerHTML="";

players.forEach(p=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<label>
<input type="checkbox" value="${p[0]}">
${p[0]} (${p[1]})
</label>`;

div.appendChild(card);
});
}

// SAVE TEAM
function saveTeam(){
let selected=document.querySelectorAll("input:checked");

if(selected.length>11){
alert("Max 11 players");
return;
}

let team=[];
selected.forEach(p=>team.push(p.value));

localStorage.setItem("team",JSON.stringify(team));

displayTeam(team);
}

// DISPLAY TEAM
function displayTeam(team){
let ul=document.getElementById("teamList");
ul.innerHTML="";

team.forEach(p=>{
let li=document.createElement("li");
li.innerText=p;
ul.appendChild(li);
});
}

// GO LEADERBOARD
function goLeaderboard(){
document.getElementById("mainPage").classList.add("hidden");
document.getElementById("leaderPage").classList.remove("hidden");

saveToFirestore();
}

// BACK
function back(){
document.getElementById("leaderPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");
}

// SAVE FIRESTORE
function saveToFirestore(){

let name=localStorage.getItem("user");
let team=JSON.parse(localStorage.getItem("team")||"[]");

db.collection("teams").doc(name).set({
name:name,
team:team,
points:0
})
.then(()=>console.log("Saved"))
.catch(err=>console.log(err));

}

// LOAD LEADERBOARD
function loadLeaderboard(){

db.collection("teams").onSnapshot(snapshot=>{

let board=document.getElementById("leaderboard");
board.innerHTML="";

snapshot.forEach(doc=>{
let data=doc.data();

let li=document.createElement("li");
li.innerText=data.name+" - "+data.points+" pts";

board.appendChild(li);
});

});
}

// AUTO LOAD
window.onload=loadLeaderboard;

</script>

</body>
</html>
